<!-- Collect all checklists for display -->

{{ $checklist := where .Site.RegularPages "Section" "checklists" }}

<div class="row cards p-4 pb-5 rounded cont-links d-flex">
  <!-- Collect checklists -->
  {{ range $checklist }}
  <div class="col-sm-12 col-md-6 col-lg-4 p-3">
    <a class="btn btn-light p-3 h-100 d-flex justify-content-between text-start" href="{{ .RelPermalink }}" role="button">{{ .Title }}</a>
  </div>
  {{ end }}
</div>
